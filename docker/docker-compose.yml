# Memory OS — Docker Compose
#
# Postgres, Valkey (Redis-compatible), and Qdrant now live on the NAS.
# Only the ARQ worker is local. Service hosts/ports live in config/services.yaml;
# secrets live in .env (POSTGRES_USER_PASSWORD, LITELLM_API_KEY, etc.).

services:
  worker:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      CONFIG_PATH: /app/config/services.yaml
      WIKI_PATH: /wiki
    volumes:
      - ${WIKI_PATH:-./wiki}:/wiki:ro
      - ${HERMES_HOME:-~/.hermes}:/hermes:rw
